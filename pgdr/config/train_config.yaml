# Policy Training Configuration (shared across all conditions)
# ===========================================================
# These hyperparameters MUST remain identical across C1-C4 for fair comparison.

training:
  algorithm: "PPO"
  num_envs: 4096
  num_steps: 20             # Steps per rollout before PPO update
  total_timesteps: 100_000_000   # 100M timesteps total
  learning_rate: 1.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  num_minibatches: 32
  update_epochs: 5
  normalize_advantages: true
  episode_length: 1000      # Steps per episode (20s at 50Hz)

seeds: [0, 1, 2]            # 3 seeds per condition for statistical validity

environment:
  name: "booster_t1_joystick"
  control_dt: 0.02          # 50 Hz
  sim_dt: 0.002             # 500 Hz physics
  action_scale: 0.25

# Experimental conditions
conditions:
  C1_uniform_dr:
    dr_mode: "uniform"
    description: "Default MuJoCo Playground hand-tuned uniform DR ranges"

  C2_pure_sysid:
    dr_mode: "none"
    description: "Train at p* only, no domain randomization"

  C3_isotropic:
    dr_mode: "isotropic"
    description: "N(p*, β²I) with tr(β²I) = tr(αΣ) — same total variance as PGDR"

  C4_pgdr_0.5:
    dr_mode: "pgdr"
    alpha: 0.5
    description: "PGDR with α=0.5 — conservative uncertainty scaling"

  C4_pgdr_1.0:
    dr_mode: "pgdr"
    alpha: 1.0
    description: "PGDR with α=1.0 — use raw CMA-ES covariance"

  C4_pgdr_2.0:
    dr_mode: "pgdr"
    alpha: 2.0
    description: "PGDR with α=2.0 — inflated uncertainty"
