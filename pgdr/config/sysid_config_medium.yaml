cmaes:
  popsize: 64
  num_generations: 100
  sigma_init: 0.3
  sigma_max: 0.5
  seed: 42

loss:
  w_q: 1.0
  w_qdot: 1.0      # must be 1.0 for friction — damping shows up in velocity, not position
  clip: 10.0        # suppress outlier candidates (falls etc.) before CMA-ES tell()

reference:
  commands:
    - {vx: 1.0, vy: 0.0, wz: 0.0, duration: 5.0}
    - {vx: 0.0, vy: 0.0, wz: 0.5, duration: 3.0}
    - {vx: -0.5, vy: 0.0, wz: 0.0, duration: 3.0}
    - {vx: 0.0, vy: 0.0, wz: 0.0, duration: 2.0}
  control_dt: 0.02

sim_a:
  perturbation_scale: 0.15

convergence:
  patience: 20
  loss_tol: 1.0e-6

covariance:
  method: "optimizer"
  empirical_top_k_frac: 0.25
  regularization_eps: 1.0e-6
