# CMA-ES System Identification Configuration
# =============================================

cmaes:
  popsize: 512              # Population size per generation (leverage GPU parallelism)
  num_generations: 300      # Max generations (monitor convergence for early stop)
  sigma_init: 0.3           # Initial step size in normalized parameter space
  seed: 42

loss:
  w_q: 1.0                  # Weight on joint position MSE
  w_qdot: 0.1               # Weight on joint velocity MSE (less reliable than positions)

reference:
  # Scripted command sequence for trajectory collection
  commands:
    - {vx: 1.0, vy: 0.0, wz: 0.0, duration: 5.0}   # Walk forward
    - {vx: 0.0, vy: 0.0, wz: 0.5, duration: 3.0}    # Turn left
    - {vx: -0.5, vy: 0.0, wz: 0.0, duration: 3.0}   # Walk backward
    - {vx: 0.0, vy: 0.0, wz: 0.0, duration: 2.0}    # Stand still
  control_dt: 0.02          # 50 Hz control rate

sim_a:
  perturbation_scale: 0.15  # 15% perturbation from defaults for Sim A ground truth

convergence:
  patience: 30              # Stop if no improvement for this many generations
  loss_tol: 1.0e-6          # Minimum loss improvement to count as progress

covariance:
  # How to extract the covariance from CMA-ES
  method: "optimizer"       # "optimizer" (σ²C from CMA-ES state) or "empirical" (top-K samples)
  empirical_top_k_frac: 0.25  # Fraction of popsize used for empirical covariance
  regularization_eps: 1.0e-6   # Jitter added to diagonal for PD guarantee
